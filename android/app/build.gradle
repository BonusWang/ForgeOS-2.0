import java.util.Locale

plugins {
    id 'com.android.application'
}

def generatedAssetsDir = layout.buildDirectory.dir('generated/assets').get().asFile
def isWindows = System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('windows')

android {
    namespace 'com.forgeos.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.forgeos.app'
        minSdk 26
        targetSdk 35
        versionCode 21
        versionName '2.0.1'
    }

    sourceSets {
        main {
            assets.srcDir generatedAssetsDir
        }
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.12.1'
}

tasks.register('buildWebAssets', Exec) {
    workingDir rootProject.file('..')
    commandLine isWindows ? ['cmd', '/c', 'npm', 'run', 'build'] : ['npm', 'run', 'build']
}

tasks.register('syncWebAssets', Copy) {
    dependsOn buildWebAssets
    doFirst {
        delete new File(generatedAssetsDir, 'web')
    }
    from rootProject.file('../dist')
    into new File(generatedAssetsDir, 'web')
}

tasks.matching { it.name.startsWith('merge') && it.name.endsWith('Assets') }.configureEach {
    dependsOn syncWebAssets
}
